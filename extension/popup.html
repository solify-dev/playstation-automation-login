<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>PS Auto Login</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>PS Auto Login</h1>

      <fieldset class="field otp-mode-fieldset">
        <legend>Second factor (all accounts)</legend>
        <label class="row">
          <input id="otp_mode_secret" type="radio" name="otp_mode" value="secret" checked />
          <span>TOTP secret (Base32) per line</span>
        </label>
        <label class="row">
          <input id="otp_mode_code" type="radio" name="otp_mode" value="code" />
          <span>OTP code per line</span>
        </label>
      </fieldset>

      <div class="field">
        <label for="accounts">Accounts (one per line)</label>
        <textarea
          id="accounts"
          name="accounts"
          rows="10"
          autocomplete="off"
          spellcheck="false"
          placeholder="email,password,totp_secret_or_code&#10;One line per account (up to 5+)"
        ></textarea>
      </div>

      <label class="row">
        <input id="remember" type="checkbox" />
        <span>Remember in extension storage</span>
      </label>

      <div class="button-row">
        <button id="run" type="button">Run</button>
        <button id="stop" type="button" class="button-danger">Stop</button>
      </div>
      <p id="status" aria-live="polite"></p>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
